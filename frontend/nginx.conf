server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Serve pre-compressed assets when available
    gzip_static on;

    # Aggressive caching for hashed static assets (JS, CSS, images)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # index.html must never be cached so fresh deploys take effect immediately
    location = /index.html {
        expires   -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — any unknown path returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
